name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }} -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure portable asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $releaseDir = Join-Path "release" $version

          if (-not (Test-Path $releaseDir)) {
            Write-Error "Release directory not found: $releaseDir"
            exit 1
          }

          $portableDir = Join-Path $releaseDir "portable"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          $portableExe = Get-ChildItem $releaseDir -Filter "*Portable*.exe" -File -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if ($portableExe) {
            Write-Host "Found portable executable: $($portableExe.FullName)"
            Copy-Item $portableExe.FullName -Destination $portableDir -Force
          } else {
            Write-Warning "Portable executable not found; falling back to win-unpacked."
            $mainExe = Get-ChildItem $releaseDir -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "win-unpacked" -and $_.Name -notmatch "uninstall|setup" } |
              Sort-Object Length -Descending |
              Select-Object -First 1

            if (-not $mainExe) {
              Write-Error "Could not find a Windows executable to package."
              exit 1
            }

            Write-Host "Using win-unpacked executable: $($mainExe.FullName)"
            Copy-Item $mainExe.FullName -Destination $portableDir -Force
          }

          New-Item -ItemType File -Path (Join-Path $portableDir ".portable") -Force | Out-Null

          $zipName = "Dev-Janitor_${version}_x64_portable.zip"
          $zipPath = Join-Path $releaseDir $zipName
          Compress-Archive -Path (Join-Path $portableDir "*") -DestinationPath $zipPath -Force
          Write-Host "Portable ZIP ready: $zipPath"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.zip
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.blockmap
            release/**/latest*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== All downloaded files ==="
          find artifacts -type f 2>/dev/null || echo "No artifacts directory"
          ls -la artifacts/ 2>/dev/null || echo "Cannot list artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
